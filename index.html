<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuri — Coming Soon</title>
  <meta name="description" content="Something thoughtful is on its way." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F5F0E6;
      --text:       #1D1510;
      --text-muted: #6A5E52;
      --accent:     #C35D2E;
      --line:       #D4C7B4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .logo {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 16px;
    }

    .tagline {
      font-size: 15px;
      color: var(--text-muted);
      font-style: italic;
    }

    hr {
      border: none;
      border-top: 1px solid var(--line);
      width: 40px;
      margin: 32px auto;
    }

    .coming-soon {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    footer {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="logo">Nuri</div>
  <p class="tagline">Something thoughtful is on its way.</p>
  <hr />
  <p class="coming-soon">Coming Soon</p>

  <footer>nuri.ink &nbsp;·&nbsp; <a href="/privacy.html" style="color:inherit;text-decoration:underline;text-underline-offset:3px;">Privacy</a> &nbsp;·&nbsp; <a href="/support.html" style="color:inherit;text-decoration:underline;text-underline-offset:3px;">Support</a></footer>

</body>
</html>
